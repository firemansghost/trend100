name: Daily Artifacts Deploy

on:
  schedule:
    # Mon–Fri 22:15 UTC (after US market close)
    - cron: "15 22 * * 1-5"
    # Mon–Fri 01:15 UTC (top-off to catch lagging EOD inputs)
    - cron: "15 1 * * 1-5"
  workflow_dispatch:

# Opt JavaScript actions to Node 24 during GitHub’s Node 20 deprecation phase; aligns with setup-node 24 below.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Artifacts scheduled run start
        run: |
          echo "Artifacts scheduled run starting (UTC: $(date -u '+%Y-%m-%d %H:%M:%S'))"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm --version

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Marketstack EOD cache
        uses: actions/cache/restore@v5
        with:
          path: data/marketstack/eod
          key: ${{ runner.os }}-marketstack-eod-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-marketstack-eod-v2-

      - name: EOD cache diagnostics (after restore)
        run: |
          echo "EOD cache file count: $(ls -1 data/marketstack/eod 2>/dev/null | wc -l || true)"
          du -sh data/marketstack/eod 2>/dev/null || true

      - name: Prefetch last-known-good turbulence gates
        run: |
          mkdir -p public
          ts=$(date +%s)
          curl -sf -o public/turbulence.gates.json \
            "https://trend100.vercel.app/turbulence.gates.json?v=$ts" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 2 \
            || true

      - name: Generate and verify artifacts
        env:
          DATA_PROVIDER: marketstack
          MARKETSTACK_API_KEY: ${{ secrets.MARKETSTACK_API_KEY }}
          MARKETSTACK_CACHE_DAYS: 2300
          MARKETSTACK_EXTEND_MAX_SYMBOLS: 200
          TURBULENCE_GATES_START: "2019-10-01"
          TURBULENCE_STOOQ_VIX_SYMBOL: "vi.c"
          TURBULENCE_GATES_FALLBACK_MAX_STALENESS_DAYS: "60"
          TURBULENCE_GATES_VERIFY_MAX_STALENESS_DAYS: "60"
          TURBULENCE_SHOCK_START: "2019-10-01"
          TURBULENCE_SHOCK_Z_THRESHOLD: "2.0"
          EOD_STOOQ_DECKS: ${{ vars.EOD_STOOQ_DECKS || '' }}
          EOD_STOOQ_FORCE_FALLBACK: ${{ vars.EOD_STOOQ_FORCE_FALLBACK || '' }}
          EOD_STOOQ_SYMBOL_OVERRIDES: ${{ vars.EOD_STOOQ_SYMBOL_OVERRIDES || '' }}
          SNAPSHOT_STRICT_ASOF_DECKS: ${{ vars.SNAPSHOT_STRICT_ASOF_DECKS || '' }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -e
          echo "=== Pre-artifacts diagnostics (no secret values) ==="
          echo "node: $(node --version)"
          echo "pnpm: $(pnpm --version)"
          echo "DATA_PROVIDER=${DATA_PROVIDER:-}"
          if [ -n "${MARKETSTACK_API_KEY:-}" ]; then echo "MARKETSTACK_API_KEY: set"; else echo "MARKETSTACK_API_KEY: unset"; fi
          if [ -n "${VERCEL_ORG_ID:-}" ]; then echo "VERCEL_ORG_ID: set"; else echo "VERCEL_ORG_ID: unset"; fi
          if [ -n "${VERCEL_PROJECT_ID:-}" ]; then echo "VERCEL_PROJECT_ID: set"; else echo "VERCEL_PROJECT_ID: unset"; fi
          if [ -n "${EOD_STOOQ_DECKS:-}" ]; then echo "EOD_STOOQ_DECKS: non-empty"; else echo "EOD_STOOQ_DECKS: empty"; fi
          if [ -n "${EOD_STOOQ_FORCE_FALLBACK:-}" ]; then echo "EOD_STOOQ_FORCE_FALLBACK: non-empty"; else echo "EOD_STOOQ_FORCE_FALLBACK: empty"; fi
          if [ -n "${EOD_STOOQ_SYMBOL_OVERRIDES:-}" ]; then echo "EOD_STOOQ_SYMBOL_OVERRIDES: non-empty"; else echo "EOD_STOOQ_SYMBOL_OVERRIDES: empty"; fi
          if [ -n "${SNAPSHOT_STRICT_ASOF_DECKS:-}" ]; then echo "SNAPSHOT_STRICT_ASOF_DECKS: non-empty"; else echo "SNAPSHOT_STRICT_ASOF_DECKS: empty"; fi
          echo "=== Running pnpm artifacts:refresh ==="
          pnpm -s artifacts:refresh

      - name: Job failure diagnostics
        if: failure()
        run: |
          echo "A step in this job failed. If the failure was in 'Generate and verify artifacts', look for errors from pnpm artifacts:refresh in that step's log."
          echo "Runtime: node $(node --version 2>/dev/null || echo unknown), pnpm $(pnpm --version 2>/dev/null || echo unknown)"

      - name: EOD cache diagnostics (after artifacts)
        run: |
          echo "EOD cache file count: $(ls -1 data/marketstack/eod 2>/dev/null | wc -l || true)"
          du -sh data/marketstack/eod 2>/dev/null || true

      - name: Save Marketstack EOD cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/marketstack/eod
          key: ${{ runner.os }}-marketstack-eod-v2-${{ github.run_id }}

      - name: Pull Vercel project config
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (prebuilt)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
