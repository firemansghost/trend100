name: Vercel Prebuilt Prod Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Align with daily-artifacts-deploy: Node 24 + JS actions opt-in during GitHub Node 20 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm --version

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Marketstack EOD cache
        uses: actions/cache/restore@v5
        with:
          path: data/marketstack/eod
          key: ${{ runner.os }}-marketstack-eod-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-marketstack-eod-v2-

      - name: EOD cache diagnostics (after restore)
        run: |
          echo "EOD cache file count: $(ls -1 data/marketstack/eod 2>/dev/null | wc -l || true)"
          du -sh data/marketstack/eod 2>/dev/null || true

      - name: Ensure public dir for turbulence gates
        run: mkdir -p public

      - name: Restore turbulence gates last-known-good cache
        uses: actions/cache/restore@v5
        with:
          path: public/turbulence.gates.json
          key: ${{ runner.os }}-turbulence-gates-lkg-v1-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-turbulence-gates-lkg-v1-

      - name: Prefetch turbulence gates (safe) + diagnostics
        env:
          PREFETCH_TMP: ${{ runner.temp }}/turbulence.gates.prefetch.json
        run: |
          set +e
          mkdir -p public
          TARGET="public/turbulence.gates.json"
          echo "=== turbulence gates prefetch ==="
          if [ -f "$TARGET" ]; then
            echo "restored_file_before_prefetch: true"
          else
            echo "restored_file_before_prefetch: false"
          fi
          ts=$(date +%s)
          rm -f "$PREFETCH_TMP"
          curl -sf -o "$PREFETCH_TMP" \
            "https://trend100.vercel.app/turbulence.gates.json?v=$ts" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 2
          CURL_EXIT=$?
          export CURL_EXIT
          if [ "$CURL_EXIT" -eq 0 ]; then
            echo "curl: success"
          else
            echo "curl: failed (exit $CURL_EXIT)"
          fi
          if [ -f "$PREFETCH_TMP" ]; then
            echo "temp_file_exists: true"
          else
            echo "temp_file_exists: false"
          fi
          node <<'NODE'
          const fs = require('fs');
          const tmp = process.env.PREFETCH_TMP || '';
          const target = 'public/turbulence.gates.json';
          const curlOk = process.env.CURL_EXIT === '0';
          let tempParseOk = false;
          let tempIsArray = false;
          let tempNonEmptyArray = false;
          if (fs.existsSync(tmp)) {
            try {
              const j = JSON.parse(fs.readFileSync(tmp, 'utf8'));
              tempParseOk = true;
              tempIsArray = Array.isArray(j);
              tempNonEmptyArray = tempIsArray && j.length > 0;
              console.log('temp_json_parse: ok');
              console.log('temp_json_is_array:', tempIsArray);
              console.log('temp_json_non_empty_array:', tempNonEmptyArray);
            } catch (e) {
              console.log('temp_json_parse: fail');
              console.log('temp_json_error:', e instanceof Error ? e.message : String(e));
            }
          } else {
            console.log('temp_json_parse: skipped (no temp file)');
          }
          if (curlOk && tempParseOk && tempNonEmptyArray) {
            fs.copyFileSync(tmp, target);
            console.log('prefetch: copied valid non-empty array JSON to public/turbulence.gates.json');
          } else {
            console.log('prefetch: did not overwrite public/turbulence.gates.json (curl failed or JSON not a non-empty array)');
          }
          try {
            fs.unlinkSync(tmp);
          } catch (_) {}
          console.log('=== turbulence.gates.json (after prefetch handling) ===');
          if (!fs.existsSync(target)) {
            console.log('final_exists: false');
            process.exit(0);
          }
          console.log('final_exists: true');
          const st = fs.statSync(target);
          console.log('final_size_bytes:', st.size);
          try {
            const j = JSON.parse(fs.readFileSync(target, 'utf8'));
            if (!Array.isArray(j)) {
              console.log('final_json: not an array');
            } else {
              console.log('final_points:', j.length);
              const last = j[j.length - 1];
              const ld = last && typeof last.date === 'string' ? last.date : 'unknown';
              console.log('final_last_date:', ld);
            }
          } catch (e) {
            console.log('final_json_parse: fail');
            console.log('final_json_error:', e instanceof Error ? e.message : String(e));
          }
          NODE

      - name: Generate and verify artifacts
        env:
          DATA_PROVIDER: marketstack
          MARKETSTACK_API_KEY: ${{ secrets.MARKETSTACK_API_KEY }}
          MARKETSTACK_CACHE_DAYS: 2300
          MARKETSTACK_EXTEND_MAX_SYMBOLS: 200
          TURBULENCE_GATES_START: "2019-10-01"
          TURBULENCE_STOOQ_VIX_SYMBOL: "vi.c"
          TURBULENCE_GATES_FALLBACK_MAX_STALENESS_DAYS: "60"
          TURBULENCE_GATES_VERIFY_MAX_STALENESS_DAYS: "60"
          TURBULENCE_SHOCK_START: "2019-10-01"
          TURBULENCE_SHOCK_Z_THRESHOLD: "2.0"
          EOD_STOOQ_DECKS: ${{ vars.EOD_STOOQ_DECKS || '' }}
          EOD_STOOQ_FORCE_FALLBACK: ${{ vars.EOD_STOOQ_FORCE_FALLBACK || '' }}
          EOD_STOOQ_SYMBOL_OVERRIDES: ${{ vars.EOD_STOOQ_SYMBOL_OVERRIDES || '' }}
          SNAPSHOT_STRICT_ASOF_DECKS: ${{ vars.SNAPSHOT_STRICT_ASOF_DECKS || '' }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: pnpm -s artifacts:refresh

      - name: EOD cache diagnostics (after artifacts)
        run: |
          echo "EOD cache file count: $(ls -1 data/marketstack/eod 2>/dev/null | wc -l || true)"
          du -sh data/marketstack/eod 2>/dev/null || true

      - name: Check turbulence gates file for cache save
        id: turbulence-gates-lkg
        if: always()
        run: |
          if [ -f public/turbulence.gates.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save turbulence gates last-known-good cache
        if: always() && steps.turbulence-gates-lkg.outputs.exists == 'true'
        uses: actions/cache/save@v5
        with:
          path: public/turbulence.gates.json
          key: ${{ runner.os }}-turbulence-gates-lkg-v1-${{ github.run_id }}

      - name: Save Marketstack EOD cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/marketstack/eod
          key: ${{ runner.os }}-marketstack-eod-v2-${{ github.run_id }}

      - name: Pull Vercel project config
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (prebuilt)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
