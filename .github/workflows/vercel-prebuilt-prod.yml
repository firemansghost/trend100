name: Vercel Prebuilt Prod Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm --version

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Marketstack EOD cache
        uses: actions/cache/restore@v4
        with:
          path: data/marketstack/eod
          key: ${{ runner.os }}-marketstack-eod-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-marketstack-eod-v2-

      - name: EOD cache diagnostics (after restore)
        run: |
          echo "EOD cache file count: $(ls -1 data/marketstack/eod 2>/dev/null | wc -l || true)"
          du -sh data/marketstack/eod 2>/dev/null || true

      - name: Ensure public dir for turbulence gates
        run: mkdir -p public

      - name: Restore turbulence gates last-known-good cache
        uses: actions/cache/restore@v4
        with:
          path: public/turbulence.gates.json
          key: ${{ runner.os }}-turbulence-gates-lkg-v1-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-turbulence-gates-lkg-v1-

      - name: Prefetch last-known-good turbulence gates
        run: |
          mkdir -p public
          ts=$(date +%s)
          curl -sf -o public/turbulence.gates.json \
            "https://trend100.vercel.app/turbulence.gates.json?v=$ts" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 2 \
            || true

      - name: Turbulence gates diagnostics (after prefetch)
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = 'public/turbulence.gates.json';
          console.log('=== turbulence.gates.json (after prefetch) ===');
          if (!fs.existsSync(p)) {
            console.log('exists: false');
            process.exit(0);
          }
          const st = fs.statSync(p);
          console.log('exists: true');
          console.log('size_bytes:', st.size);
          try {
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (!Array.isArray(j)) {
              console.log('json_parse: fail (not an array)');
            } else {
              console.log('json_parse: ok');
              console.log('points:', j.length);
              const last = j[j.length - 1];
              const ld = last && typeof last.date === 'string' ? last.date : 'unknown';
              console.log('last_date:', ld);
            }
          } catch (e) {
            console.log('json_parse: fail');
            console.log('json_error:', e instanceof Error ? e.message : String(e));
          }
          NODE

      - name: Generate and verify artifacts
        env:
          DATA_PROVIDER: marketstack
          MARKETSTACK_API_KEY: ${{ secrets.MARKETSTACK_API_KEY }}
          MARKETSTACK_CACHE_DAYS: 2300
          MARKETSTACK_EXTEND_MAX_SYMBOLS: 200
          TURBULENCE_GATES_START: "2019-10-01"
          TURBULENCE_STOOQ_VIX_SYMBOL: "vi.c"
          TURBULENCE_GATES_FALLBACK_MAX_STALENESS_DAYS: "60"
          TURBULENCE_GATES_VERIFY_MAX_STALENESS_DAYS: "60"
          TURBULENCE_SHOCK_START: "2019-10-01"
          TURBULENCE_SHOCK_Z_THRESHOLD: "2.0"
          EOD_STOOQ_DECKS: ${{ vars.EOD_STOOQ_DECKS || '' }}
          EOD_STOOQ_FORCE_FALLBACK: ${{ vars.EOD_STOOQ_FORCE_FALLBACK || '' }}
          EOD_STOOQ_SYMBOL_OVERRIDES: ${{ vars.EOD_STOOQ_SYMBOL_OVERRIDES || '' }}
          SNAPSHOT_STRICT_ASOF_DECKS: ${{ vars.SNAPSHOT_STRICT_ASOF_DECKS || '' }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: pnpm -s artifacts:refresh

      - name: EOD cache diagnostics (after artifacts)
        run: |
          echo "EOD cache file count: $(ls -1 data/marketstack/eod 2>/dev/null | wc -l || true)"
          du -sh data/marketstack/eod 2>/dev/null || true

      - name: Check turbulence gates file for cache save
        id: turbulence-gates-lkg
        if: always()
        run: |
          if [ -f public/turbulence.gates.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save turbulence gates last-known-good cache
        if: always() && steps.turbulence-gates-lkg.outputs.exists == 'true'
        uses: actions/cache/save@v4
        with:
          path: public/turbulence.gates.json
          key: ${{ runner.os }}-turbulence-gates-lkg-v1-${{ github.run_id }}

      - name: Save Marketstack EOD cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/marketstack/eod
          key: ${{ runner.os }}-marketstack-eod-v2-${{ github.run_id }}

      - name: Pull Vercel project config
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (prebuilt)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
